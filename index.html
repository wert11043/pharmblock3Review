<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>考試3 藥物配對題</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Noto Sans TC","Microsoft JhengHei",sans-serif; background:#0f172a; color:#e2e8f0; min-height:100vh; }
  header { background:#1e293b; padding:12px 16px; border-bottom:1px solid #334155; display:flex; align-items:center; gap:10px; }
  header h1 { font-size:1rem; color:#f1f5f9; flex:1; }
  #score-box { background:#0f172a; padding:4px 12px; border-radius:999px; font-size:0.85rem; color:#94a3b8; white-space:nowrap; }
  #score-box span { color:#38bdf8; font-weight:700; }

  .tab-row { display:flex; gap:6px; padding:8px 14px; overflow-x:auto; background:#1e293b; border-bottom:1px solid #334155; -webkit-overflow-scrolling:touch; scrollbar-width:thin; }
  .cat-btn { background:#334155; border:none; color:#94a3b8; padding:5px 11px; border-radius:7px; cursor:pointer; font-size:0.78rem; white-space:nowrap; -webkit-tap-highlight-color:transparent; }
  .cat-btn.active { background:#0284c7; color:#fff; }

  #modes { display:none; gap:5px; padding:7px 14px; background:#162032; border-bottom:1px solid #334155; overflow-x:auto; -webkit-overflow-scrolling:touch; }
  #modes.visible { display:flex; }
  .mode-btn { background:#1e293b; border:1px solid #334155; color:#94a3b8; padding:4px 12px; border-radius:999px; cursor:pointer; font-size:0.78rem; white-space:nowrap; -webkit-tap-highlight-color:transparent; }
  .mode-btn.active[data-mode="機轉"]   { background:#0369a1; border-color:#0369a1; color:#fff; }
  .mode-btn.active[data-mode="副作用"] { background:#b45309; border-color:#b45309; color:#fff; }
  .mode-btn.active[data-mode="禁忌症"] { background:#be123c; border-color:#be123c; color:#fff; }
  .mode-btn.active[data-mode="適應症"] { background:#166534; border-color:#166534; color:#fff; }
  .mode-btn.active[data-mode="注意事項"]{ background:#6b21a8; border-color:#6b21a8; color:#fff; }

  #controls { padding:8px 14px; display:flex; gap:7px; align-items:center; flex-wrap:wrap; }
  #progress-txt { color:#64748b; font-size:0.8rem; flex:1; }
  .btn { background:#334155; border:none; color:#e2e8f0; padding:5px 13px; border-radius:7px; cursor:pointer; font-size:0.78rem; -webkit-tap-highlight-color:transparent; }
  .btn-primary { background:#0284c7; }

  #game { display:grid; grid-template-columns:1fr 1fr; gap:9px; padding:10px 14px; max-width:1100px; margin:0 auto; }
  .col-header { font-size:0.7rem; text-transform:uppercase; letter-spacing:.07em; color:#64748b; margin-bottom:5px; }
  .card { background:#1e293b; border:2px solid #334155; border-radius:9px; padding:10px 12px; cursor:pointer; font-size:0.82rem; line-height:1.5; transition:border-color .12s,background .12s; min-height:50px; display:flex; align-items:center; margin-bottom:6px; user-select:none; -webkit-user-select:none; -webkit-tap-highlight-color:transparent; }
  .card.selected { border-color:#f59e0b; background:#1c1800; }
  .card.correct  { border-color:#22c55e; background:#052e16; color:#86efac; cursor:default; }
  .card.wrong    { border-color:#ef4444; background:#2d0000; animation:shake .35s; }
  .card.locked   { cursor:default; opacity:.5; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }

  #banner { display:none; text-align:center; padding:24px 16px; }
  #banner h2 { font-size:1.6rem; color:#38bdf8; margin-bottom:6px; }
  #banner p  { color:#94a3b8; margin-bottom:14px; }

  @media(max-width:560px){ #game{grid-template-columns:1fr;} }
</style>
</head>
<body>
<header>
  <h1>🧬 藥物配對題</h1>
  <div id="score-box">得分 <span id="score">0</span> / <span id="total">0</span></div>
</header>
<div class="tab-row" id="cats"></div>
<div id="modes">
  <button class="mode-btn active" data-mode="機轉"   onclick="setMode('機轉',this)">⚙️ 機轉</button>
  <button class="mode-btn" data-mode="適應症"        onclick="setMode('適應症',this)">🎯 適應症</button>
  <button class="mode-btn" data-mode="副作用"        onclick="setMode('副作用',this)">⚠️ 副作用</button>
  <button class="mode-btn" data-mode="禁忌症"        onclick="setMode('禁忌症',this)">🚫 禁忌症</button>
  <button class="mode-btn" data-mode="注意事項"      onclick="setMode('注意事項',this)">📌 注意事項</button>
</div>
<div id="controls">
  <span id="progress-txt">選擇上方類別開始</span>
  <button class="btn btn-primary" id="btn-shuffle" onclick="shuffle()" style="display:none">🔀 重洗</button>
  <button class="btn" id="btn-reveal" onclick="revealAll()" style="display:none">👁 揭曉</button>
</div>
<div id="banner">
  <h2>🎉 完成！</h2>
  <p id="banner-msg"></p>
  <button class="btn btn-primary" onclick="shuffle()">再練一次</button>
</div>
<div id="game">

  <div><div class="col-header" id="right-header">作用機轉</div><div id="mech-cards"></div></div>
</div>

// ---- State ----
let currentCategory = null;
let currentMode = "機轉";
let pairs = [], drugOrder = [], mechOrder = [];
let matched = new Set();
let selectedDrug = null, selectedMech = null;
let score = 0;

// ---- Build category tabs ----
const catsDiv = document.getElementById("cats");
Object.keys(DATA).forEach(cat => {
  const btn = document.createElement("button");
  btn.className = "cat-btn";
  btn.textContent = cat;
  btn.onclick = function(){ loadCategory(cat, btn); };
  catsDiv.appendChild(btn);
});

function loadCategory(cat, btn) {
  currentCategory = cat;
  document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
  if (btn) btn.classList.add("active");
  document.getElementById("modes").classList.add("visible");
  startGame();
}

function setMode(mode, btn) {
  currentMode = mode;
  document.querySelectorAll(".mode-btn").forEach(b => b.classList.remove("active"));
  if (btn) btn.classList.add("active");
  if (currentCategory) startGame();
}

function startGame() {
  const raw = DATA[currentCategory][currentMode];
  if (!raw || raw.length === 0) return;
  pairs = raw.map((p, i) => ({...p, id: i}));
  matched.clear(); selectedDrug = null; selectedMech = null; score = 0;
  document.getElementById("score").textContent = 0;
  document.getElementById("total").textContent = pairs.length;
  document.getElementById("banner").style.display = "none";
  document.getElementById("btn-shuffle").style.display = "";
  document.getElementById("btn-reveal").style.display = "";
  const labels = { 機轉:"作用機轉", 適應症:"適應症", 副作用:"副作用 / 毒性", 禁忌症:"Contraindication", 注意事項:"注意事項 / 考點" };
  document.getElementById("right-header").textContent = labels[currentMode] || currentMode;
  renderGame();
}

function shuffle() { if (currentCategory) startGame(); }

function renderGame() {
  drugOrder = pairs.map(p => p.id);
  mechOrder = shuffleArr(pairs.map(p => p.id));
  const dc = document.getElementById("drug-cards");
  const mc = document.getElementById("mech-cards");
  dc.innerHTML = ""; mc.innerHTML = "";
  drugOrder.forEach(id => dc.appendChild(makeCard(pairs[id].drug, "drug", id)));
  mechOrder.forEach(id => mc.appendChild(makeCard(pairs[id].mech, "mech", id)));
  updateProgress();
}

function makeCard(text, type, id) {
  const el = document.createElement("div");
  el.className = "card";
  el.dataset.id = id; el.dataset.type = type;
  el.textContent = text;
  el.onclick = function(){ onCardClick(type, id, el); };
  return el;
}

function onCardClick(type, id, el) {
  if (matched.has(id)) return;
  if (type === "drug") {
    document.querySelectorAll(".card[data-type=drug]").forEach(c => c.classList.remove("selected"));
    if (selectedDrug === id) { selectedDrug = null; return; }
    selectedDrug = id; el.classList.add("selected");
  } else {
    document.querySelectorAll(".card[data-type=mech]").forEach(c => c.classList.remove("selected"));
    if (selectedMech === id) { selectedMech = null; return; }
    selectedMech = id; el.classList.add("selected");
  }
  tryMatch();
}

function tryMatch() {
  if (selectedDrug === null || selectedMech === null) return;
  const dEl = document.querySelector('.card[data-type=drug][data-id="'+selectedDrug+'"]');
  const mEl = document.querySelector('.card[data-type=mech][data-id="'+selectedMech+'"]');
  if (selectedDrug === selectedMech) {
    matched.add(selectedDrug); score++;
    document.getElementById("score").textContent = score;
    dEl.classList.remove("selected"); mEl.classList.remove("selected");
    dEl.classList.add("correct","locked"); mEl.classList.add("correct","locked");
    dEl.onclick = null; mEl.onclick = null;
    selectedDrug = null; selectedMech = null;
    updateProgress();
    if (matched.size === pairs.length) setTimeout(showBanner, 350);
  } else {
    dEl.classList.add("wrong"); mEl.classList.add("wrong");
    setTimeout(function(){ dEl.classList.remove("wrong","selected"); mEl.classList.remove("wrong","selected"); }, 600);
    selectedDrug = null; selectedMech = null;
  }
}

function updateProgress() {
  document.getElementById("progress-txt").textContent = currentCategory
    ? currentCategory + "【" + currentMode + "】：" + matched.size + " / " + pairs.length
    : "選擇上方類別開始";
}

function revealAll() {
  if (!currentCategory) return;
  pairs.forEach(function(p) {
    if (!matched.has(p.id)) {
      const dEl = document.querySelector('.card[data-type=drug][data-id="'+p.id+'"]');
      const mEl = document.querySelector('.card[data-type=mech][data-id="'+p.id+'"]');
      if (dEl) { dEl.classList.add("correct","locked"); dEl.classList.remove("selected"); dEl.onclick=null; }
      if (mEl) { mEl.classList.add("correct","locked"); mEl.classList.remove("selected"); mEl.onclick=null; }
      matched.add(p.id);
    }
  });
  updateProgress();
}

function showBanner() {
  document.getElementById("banner").style.display = "block";

function shuffleArr(arr) {
  const a = arr.slice();
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    const t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}
